    return nisn.replace(/^0+/, '');
}

function cek() {
    let input = document.getElementById("nisn").value.trim();
    let normInput = normalize(input);

    let found = data.find(d => normalize(d.NISN) === normInput);

    let resultDiv = document.getElementById("result");

    if(found) {
        resultDiv.innerHTML = `
            <p><b>Nama:</b> ${found.NAMA}</p>
            <p><b>NISN:</b> ${found.NISN}</p>
            <p class="lulus">LULUS</p>

    } else {
        resultDiv.innerHTML = "<p>NISN tidak ditemukan</p>";

}
